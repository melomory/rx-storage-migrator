name: ci

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build_test:
    name: Build / Test / Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: NUKE Clean
        run: dotnet nuke Clean

      - name: NUKE Restore
        run: dotnet nuke Restore

      - name: NUKE Compile
        run: dotnet nuke Compile --configuration Release

      - name: NUKE Test
        run: dotnet nuke Test --configuration Release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: artifacts/coverage/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Publish test report to Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: unit-tests
          path: artifacts/test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: artifacts/coverage/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '16 16'

      - name: Add coverage summary to job summary
        if: always()
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage badge artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: |
            code-coverage-results.md
            badges/coverage.svg
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: artifacts/coverage/coverage.cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  publish:
    name: Publish artifacts
    needs: build_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            archive_name: RxStorageMigrator-win-x64
          - rid: linux-x64
            archive_name: RxStorageMigrator-linux-x64
          - rid: osx-x64
            archive_name: RxStorageMigrator-osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET from global.json
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/packages.lock.json', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: NUKE Publish
        run: >
          dotnet nuke Publish
          --configuration Release
          --self-contained true
          --runtime ${{ matrix.rid }}
          --publish-dir artifacts/publish/${{ matrix.rid }}

      - name: Archive published files
        shell: bash
        run: |
          cd artifacts/publish
          tar -czf ../${{ matrix.archive_name }}.tar.gz ${{ matrix.rid }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: artifacts/${{ matrix.archive_name }}.tar.gz

  release:
    name: Create GitHub Release
    needs:
      - build_test
      - publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download published artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        run: ls -R release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
